name: lighthouse-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Lighthouse CI CLI
        run: npm install -g @lhci/cli@0.15.x

      - name: Run Lighthouse CI
        run: lhci autorun --config=.lighthouserc.json --verbose

      - name: Upload Lighthouse debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-debug
          path: .lighthouseci/
          if-no-files-found: warn
